name: "Deploy Spring Boot to EC2"
description: "Build and deploy Spring Boot app to AWS EC2"

inputs:
host:
description: "EC2 Host"
required: true
user:
description: "EC2 User"
required: true
ssh_key:
description: "SSH Private Key"
required: true

runs:
using: "composite"
steps:

```
- name: Build with Maven
  run: mvn clean package -DskipTests
  shell: bash

- name: Copy JAR to EC2
  uses: appleboy/scp-action@v0.1.7
  with:
    host: ${{ inputs.host }}
    username: ${{ inputs.user }}
    key: ${{ inputs.ssh_key }}
    source: target/*.jar
    target: /home/${{ inputs.user }}/app
    strip_components: 1

- name: Restart App on EC2
  uses: appleboy/ssh-action@v1.0.3
  with:
    host: ${{ inputs.host }}
    username: ${{ inputs.user }}
    key: ${{ inputs.ssh_key }}
    script: |
      sudo fuser -k 8080/tcp || true
      nohup java -jar /home/${{ inputs.user }}/app/*.jar > app.log 2>&1 &
```
