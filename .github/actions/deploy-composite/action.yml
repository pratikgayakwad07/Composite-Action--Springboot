name: "Deploy Spring Boot to EC2"
description: "Build and deploy Spring Boot app to AWS EC2"

inputs:
  host:
    description: "EC2 Host"
    required: true
  user:
    description: "EC2 User"
    required: true
  ssh_key:
    description: "SSH Private Key"
    required: true

runs:
  using: "composite"
  steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package -DskipTests

    - name: Deploy to EC2 via SSH
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "target/*.jar"
        target: "/home/${{ secrets.EC2_USERNAME }}/app"
        strip_components: 1

    - name: Restart Application
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Kill the old process running on 8080
          sudo fuser -k 8080/tcp || true
          # Run the new JAR in the background
          nohup java -jar /home/${{ secrets.EC2_USERNAME }}/app/*.jar > app.log 2>&1 &
          # Kill old process if it exists
          sudo fuser -k 8080/tcp || true
          cd /home/${{ inputs.user }}
          # Run the new jar
          nohup java -jar *.jar > app.log 2>&1 &
        EOF
