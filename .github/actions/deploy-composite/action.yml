name: "Deploy Spring Boot to EC2"
description: "Build and deploy Spring Boot app to AWS EC2"

inputs:
  host:
    description: "EC2 Host"
    required: true
  user:
    description: "EC2 User"
    required: true
  ssh_key:
    description: "SSH Private Key"
    required: true

runs:
  using: "composite"
  steps:
    - name: Build with Maven
      run: mvn clean package -DskipTests
      shell: bash

    - name: Setup SSH Key
      shell: bash
      run: |
        mkdir -p ~/.ssh
        # Use printf to preserve newlines and avoid libcrypto errors
        printf "%s\n" "${{ inputs.ssh_key }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        # Add host to known_hosts to prevent interactive prompt
        ssh-keyscan -H ${{ inputs.host }} >> ~/.ssh/known_hosts

    - name: Copy JAR to EC2
      shell: bash
      run: |
        # Use -i to explicitly point to the created key
        scp -v -i ~/.ssh/id_rsa target/*.jar ${{ inputs.user }}@${{ inputs.host }}:/home/${{ inputs.user }}/
      
    - name: Restart App on EC2
      shell: bash
      run: |
        ssh -i ~/.ssh/id_rsa ${{ inputs.user }}@${{ inputs.host }} << 'EOF'
          # Kill old process if it exists
          sudo fuser -k 8080/tcp || true
          cd /home/${{ inputs.user }}
          # Run the new jar
          nohup java -jar *.jar > app.log 2>&1 &
        EOF
