name: "Maven Build and EC2 Deploy"
description: "Builds Spring Boot JAR and deploys to EC2 via native SSH/SCP"

inputs:
  host:
    description: "EC2 Public IP"
    required: true
  user:
    description: "EC2 Username (ubuntu or ec2-user)"
    required: true
  ssh_key:
    description: "Private SSH Key (.pem content)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Build with Maven
      shell: bash
      run: mvn clean package -DskipTests

    - name: Setup SSH Key
      shell: bash
      env:
        SSH_KEY_DATA: ${{ inputs.ssh_key }}
      run: |
        mkdir -p ~/.ssh
        # Using the ENV variable preserves the exact formatting of the key
        echo "$SSH_KEY_DATA" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ inputs.host }} >> ~/.ssh/known_hosts

    - name: Copy JAR to EC2
      shell: bash
      run: |
        # Moving the jar to the app folder on EC2
        scp -i ~/.ssh/id_rsa target/*.jar ${{ inputs.user }}@${{ inputs.host }}:/home/${{ inputs.user }}/

    - name: Restart Application
      shell: bash
      run: |
        ssh -i ~/.ssh/id_rsa ${{ inputs.user }}@${{ inputs.host }} << 'EOF'
          # Kill process on 8080 if it exists
          sudo fuser -k 8080/tcp || true
          # Run the new jar
          cd /home/${{ inputs.user }}
          nohup java -jar *.jar > app.log 2>&1 &
        EOF
