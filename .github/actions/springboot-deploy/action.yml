name: Spring Boot CI/CD (EC2 Deploy)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Application
        run: mvn clean package

      # 🔥 Setup SSH Key (Correct Way)
      - name: Setup SSH Key
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          chmod 600 key.pem

      # 🔥 Copy JAR to EC2
      - name: Copy JAR to EC2
        run: |
          scp -o StrictHostKeyChecking=no -i key.pem target/*.jar ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/ubuntu/app.jar

      # 🔥 Deploy on EC2
      - name: Deploy Application
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            pkill -f app.jar || true
            nohup java -jar /home/ubuntu/app.jar > app.log 2>&1 &
          "
