name: "Spring Boot Deploy"
description: "Builds and deploys a Spring Boot app to EC2"

inputs:
  host:
    description: "EC2 Public IP"
    required: true
  user:
    description: "EC2 User (ubuntu/ec2-user)"
    required: true
  key:
    description: "EC2 SSH Private Key"
    required: true

runs:
  using: "composite"
  steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build with Maven
      run: mvn clean package -DskipTests
      shell: bash

    - name: Copy JAR to EC2
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.user }}
        key: ${{ inputs.key }}
        source: "target/*.jar"
        target: "/home/${{ inputs.user }}/app"
        strip_components: 1

    - name: Deploy & Restart
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.user }}
        key: ${{ inputs.key }}
        script: |
          mkdir -p /home/${{ inputs.user }}/app
          fuser -k 8080/tcp || true
          nohup java -jar /home/${{ secrets.EC2_USER }}/app/*.jar > /home/${{ inputs.user }}/app/app.log 2>&1 &
