name: "Spring Boot Deploy"
description: "Build and deploy Spring Boot app to EC2 via SSH"

inputs:
  ec2-host:
    required: true
  ec2-user:
    required: true
    default: "ubuntu"
  ec2-key:
    required: true

runs:
  using: "composite"
  steps:
    - name: Build App
      run: mvn clean package -DskipTests
      shell: bash

    - name: Setup SSH Key
      shell: bash
      env:
        # We map the input to an env variable to preserve formatting
        RAW_SSH_KEY: ${{ inputs.ec2-key }}
      run: |
        # Write the env variable to a file
        echo "$RAW_SSH_KEY" > mvn-key.pem
        
        # Standardize line endings and add a trailing newline
        sed -i 's/\r$//' mvn-key.pem
        echo "" >> mvn-key.pem
        
        chmod 600 mvn-key.pem

    - name: Copy JAR to EC2
      shell: bash
      run: |
        # Using -o IdentitiesOnly ensures SSH doesn't try 'runner' keys
        scp -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            -i react-app-key.pem \
            target/*.jar ${{ inputs.ec2-user }}@${{ inputs.ec2-host }}:/home/${{ inputs.ec2-user }}/app.jar

    - name: Run App on EC2
      shell: bash
      run: |
        ssh -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            -i mvn.pem \
            ${{ inputs.ec2-user }}@${{ inputs.ec2-host }} "
          sudo pkill -f app.jar || true
          nohup java -jar /home/${{ inputs.ec2-user }}/app.jar > /home/${{ inputs.ec2-user }}/app.log 2>&1 &
        "

    - name: Cleanup
      if: always()
      run: rm -f react-app-key.pem
      shell: bash
