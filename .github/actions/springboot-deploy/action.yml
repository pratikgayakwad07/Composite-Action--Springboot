name: "Spring Boot Deploy"
description: "Deploy Spring Boot app to EC2"

inputs:
  ec2-host:
    required: true
  ec2-user:
    required: true
  ec2-key:
    required: true

runs:
  using: "composite"
  steps:
    - name: Build App
      run: mvn clean package
      shell: bash

    - name: Setup SSH Key
      run: |
        echo "${{ inputs.ec2-key }}" > react-app-key.pem
        chmod 600 react-app-key.pem
      shell: bash

    - name: Copy JAR
      run: |
        scp -o StrictHostKeyChecking=no -i react-app-key.pem target/*.jar ${{ inputs.ec2-user }}@${{ inputs.ec2-host }}:/home/ubuntu/app.jar
      shell: bash

    - name: Deploy App
      run: |
        ssh -o StrictHostKeyChecking=no -i react-app-key.pem ${{ inputs.ec2-user }}@${{ inputs.ec2-host }} "
        pkill -f app.jar || true
        nohup java -jar /home/ubuntu/app.jar > app.log 2>&1 &
        "
      shell: bash
