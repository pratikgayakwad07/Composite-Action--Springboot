name: "Spring Boot Deploy"
description: "Build and deploy Spring Boot app to EC2 via SSH"

inputs:
  ec2-host:
    required: true
  ec2-user:
    required: true
  ec2-key:
    required: true

runs:
  using: "composite"
  steps:
    - name: Build App
      run: mvn clean package -DskipTests
      shell: bash

    - name: Prepare SSH Key
      run: |
        # Using a heredoc to preserve the exact formatting of the PEM key
        cat <<EOF > react-app-key.pem
        ${{ inputs.ec2-key }}
        EOF
        chmod 600 react-app-key.pem
      shell: bash

    - name: Copy JAR to EC2
      run: |
        scp -o StrictHostKeyChecking=no -i react-app-key.pem target/*.jar ${{ inputs.ec2-user }}@${{ inputs.ec2-host }}:/home/${{ inputs.ec2-user }}/app.jar
      shell: bash

    - name: Run App on EC2
      run: |
        ssh -o StrictHostKeyChecking=no -i react-app-key.pem ${{ inputs.ec2-user }}@${{ inputs.ec2-host }} "
          pkill -f app.jar || true
          nohup java -jar /home/${{ inputs.ec2-user }}/app.jar > app.log 2>&1 &
        "
      shell: bash

    - name: Cleanup
      run: rm -f react-app-key.pem
      shell: bash
