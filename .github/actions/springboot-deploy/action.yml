name: "Spring Boot Deploy"
description: "Build and deploy Spring Boot app to EC2 via SSH"

inputs:
  ec2-host:
    required: true
  ec2-user:
    required: true
    default: "ubuntu"
  ec2-key:
    required: true

runs:
  using: "composite"
  steps:
    - name: Build App
      run: mvn clean package -DskipTests
      shell: bash

    - name: Setup SSH Key
      shell: bash
      run: |
        # Use printf to avoid escaping issues and ensure a trailing newline
        printf "%s\n" "${{ inputs.ec2-key }}" > react-app-key.pem
        
        # Clean up any Windows-style line endings
        sed -i 's/\r$//' react-app-key.pem
        
        # Strict permissions required by SSH
        chmod 600 react-app-key.pem

    - name: Copy JAR to EC2
      shell: bash
      run: |
        # -o IdentitiesOnly=yes prevents using the runner's default keys
        # -v (verbose) will help us see exactly why it's failing if it happens again
        scp -v -o StrictHostKeyChecking=no \
               -o IdentitiesOnly=yes \
               -i react-app-key.pem \
               target/*.jar ${{ inputs.ec2-user }}@${{ inputs.ec2-host }}:/home/${{ inputs.ec2-user }}/app.jar

    - name: Run App on EC2
      shell: bash
      run: |
        ssh -o StrictHostKeyChecking=no \
            -o IdentitiesOnly=yes \
            -i react-app-key.pem \
            ${{ inputs.ec2-user }}@${{ inputs.ec2-host }} "
          sudo pkill -f app.jar || true
          nohup java -jar /home/${{ inputs.ec2-user }}/app.jar > /home/${{ inputs.ec2-user }}/app.log 2>&1 &
        "

    - name: Cleanup
      if: always()
      run: rm -f react-app-key.pem
      shell: bash
