name: "Spring Boot Deploy"
description: "Build and deploy Spring Boot app to EC2 via SSH"

inputs:
  ec2-host:
    required: true
  ec2-user:
    required: true
    default: "ubuntu"
  ec2-key:
    required: true

runs:
  using: "composite"
  steps:
    - name: Build App
      run: mvn clean package -DskipTests
      shell: bash

    - name: Deploy via SSH Agent
      shell: bash
      env:
        SSH_PRIVATE_KEY: ${{ inputs.ec2-key }}
        REMOTE_HOST: ${{ inputs.ec2-host }}
        REMOTE_USER: ${{ inputs.ec2-user }}
      run: |
        # 1. Start the ssh-agent
        eval $(ssh-agent -s)

        # 2. Add the key directly from the environment variable
        # Use 'tr' to fix any potential Windows-style line endings (\r)
        echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -

        # 3. Create the .ssh directory if it doesn't exist
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh

        # 4. Perform SCP (notice we no longer need -i because it's in the agent)
        scp -o StrictHostKeyChecking=no target/*.jar ${REMOTE_USER}@${REMOTE_HOST}:/home/${REMOTE_USER}/app.jar

        # 5. Perform SSH command
        ssh -o StrictHostKeyChecking=no ${REMOTE_USER}@${REMOTE_HOST} "
          sudo pkill -f app.jar || true
          nohup java -jar /home/${REMOTE_USER}/app.jar > /home/${REMOTE_USER}/app.log 2>&1 &
        "

        # 6. Kill the agent for security
        ssh-agent -k
